services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: square-frame-tool
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8088}:80"
    environment:
      APP_NAME: "${APP_NAME:-Square White Frame}"
      APP_ENV: "${APP_ENV:-production}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_TIMEZONE: "${APP_TIMEZONE:-Asia/Bangkok}"
      APP_LOG_FILE: "/var/www/html/storage/app.log"
    volumes:
      - ./storage:/var/www/html/storage
      - ./public/downloads:/var/www/html/public/downloads
    security_opt:
      - no-new-privileges:true
